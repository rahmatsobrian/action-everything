name: Check Runner Spec

on:
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  check-spec:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Run Spec Checker
        run: |
          chmod +x check_spec.sh
          ./check_spec.sh
          
