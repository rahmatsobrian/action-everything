name: Repo Cloner

on:
  workflow_dispatch:

jobs:
  clone-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Clone Source Repo
        run: |
          git clone https://github.com/rahmatsobrian/kernel_xiaomi_vince_4.19.325.git kernel
          cd kernel
          git remote remove origin
          git remote add origin https://x-access-token:${{ secrets.GH_TOKEN }}@github.com/rahmatsobrian/kernel_xiaomi_vince_ksu_4.19.325.git
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git branch -M main
          git add -A
          git commit -m "upload source" || echo "Nothing to commit"
          git push -u origin main --force
