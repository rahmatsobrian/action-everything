name: Kernel Build GCC

on:
  workflow_dispatch:
  watch:
    types: [started]

defaults:
  run:
    shell: bash

jobs:
  buildtest:
    runs-on: ubuntu-latest

    steps:
      # ========================
      # Checkout repo
      # ========================
      - name: Checkout
        uses: actions/checkout@v3

      # ========================
      # Swap (anti OOM)
      # ========================
      - name: Set Swap Space
        uses: pierotofy/set-swap-space@master
        with:
          swap-size-gb: 5

      # ========================
      # Install packages
      # ========================
      - name: Install Packages
        run: |
          sudo apt-get update -y
          sudo apt-get install -y \
            git curl wget zip unzip tar jq \
            build-essential bc bison flex perl python3 \
            gcc-aarch64-linux-gnu gcc-arm-linux-gnueabi \
            libncurses5-dev libssl-dev libelf-dev \
            ccache clang llvm lld \
            lzop pngcrush schedtool squashfs-tools xsltproc \
            zlib1g-dev libxml2 libxml2-utils \
            dos2unix kmod

      # ========================
      # Clone kernel source
      # ========================
      - name: Clone Kernel Source
        run: |
          git clone --depth=1 -b a13/master https://github.com/mi-msm8937/android_kernel_xiaomi_msm8937.git kernel

      # ========================
      # Compile kernel
      # ========================
      - name: Compile Kernel
        run: |
          mkdir -p logs

          export ARCH=arm64
          export SUBARCH=arm64

          export KBUILD_BUILD_USER=github
          export KBUILD_BUILD_HOST=actions

          export CROSS_COMPILE=aarch64-linux-gnu-
          export CROSS_COMPILE_ARM32=arm-linux-gnueabi-

          cd kernel

          # Clean build
          make O=out clean
          make O=out mrproper

          # Defconfig
          make O=out ARCH=arm64 msm8937_defconfig

          # Build
          make -j$(nproc --all) \
            O=out \
            ARCH=arm64 \
            CROSS_COMPILE=$CROSS_COMPILE \
            CROSS_COMPILE_ARM32=$CROSS_COMPILE_ARM32 \
            2>&1 | tee $GITHUB_WORKSPACE/logs/build.log

      # ========================
      # Upload log
      # ========================
      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: logs/build.log

      # ========================
      # Upload kernel image
      # ========================
      - name: Upload Image.gz
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz
          path: kernel/out/arch/arm64/boot/Image.gz

      - name: Upload Image.gz-dtb
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: Image.gz-dtb
          path: kernel/out/arch/arm64/boot/Image.gz-dtb
